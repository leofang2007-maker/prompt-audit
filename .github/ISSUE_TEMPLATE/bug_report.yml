name: 🐛 Bug report
description: Something isn't working as expected
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the problem.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
        3. see error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: dropdown
    id: where
    attributes:
      label: Component
      options:
        - Server (Spring Boot API)
        - Web console
        - Client plugin
        - Deployment / docker-compose / CI
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: "e.g. v0.0.8 or commit sha"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: "⚠️ Redact any tokens and prompt text before pasting."
      render: shell
