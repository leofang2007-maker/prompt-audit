name: ✨ Feature request
description: Suggest a capability or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping shape **prompt-audit**! Describe the *need* first — the problem and who it
        affects — not just a solution. That helps us build the right thing.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: The use case, who's affected, and why it matters.
      placeholder: "As a compliance lead, I need … so that …"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution (optional)
      description: How you imagine it working, if you have an idea.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Ingest / API contract
        - Audit console (web UI)
        - Multi-tenancy / auth / RBAC
        - Client plugin (Qoder / Claude Code / other tool)
        - Deployment / ops / CI-CD
        - Compliance / retention / export / tamper-evidence
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Alternatives considered, links, screenshots, scale/volume, etc.
