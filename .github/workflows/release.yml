name: Release image

# Build the self-contained server image (SPA baked into the jar) and push to GitHub Container
# Registry (ghcr.io). Auth uses the built-in GITHUB_TOKEN — NO secrets to configure.
# Public repo ⇒ public image ⇒ your host pulls it anonymously (no login needed).
#
# Trigger: push a tag like `v1.0.0`  →  pushes ghcr.io/<owner>/promptaudit-server:1.0.0 + :latest
#          (or run manually from the Actions tab with a version input).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "image tag (e.g. 1.0.0)"
        required: true

permissions:
  contents: read
  packages: write        # lets GITHUB_TOKEN push to ghcr

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image ref + tag
        run: |
          echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/promptaudit-server" >> "$GITHUB_ENV"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          fi

      - name: Log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.VERSION }}
            ${{ env.IMAGE }}:latest

      - name: Summary
        run: |
          echo "Pushed \`${IMAGE}:${VERSION}\` and \`:latest\`." >> "$GITHUB_STEP_SUMMARY"
          echo "Deploy on your host: set TAG=${VERSION} in .env then run ops/deploy.sh" >> "$GITHUB_STEP_SUMMARY"
