name: CI

# PR / push gate — pure verification, no secrets, anyone who forks can run it.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: backend (mvn test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"       # builds bytecode 8 (pom java.version=8); tests run on in-memory H2
          cache: maven
      - run: mvn -B -q test
        working-directory: server

  frontend:
    name: frontend (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: web
      - run: npm run build
        working-directory: web
