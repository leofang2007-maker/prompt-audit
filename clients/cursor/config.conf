# =============================================================================
# prompt-audit Claude Code adapter — bundled default config (lowest priority)
# =============================================================================
# Ships with the adapter. UNCONFIGURED by default (placeholder URL + empty token)
# → the hook no-ops and passes the prompt through.
#
# Lookup priority (high → low):
#   1) <cwd>/.prompt-audit.conf
#   2) ${PROMPT_AUDIT_DATA:-~/.prompt-audit}/config.conf   ← in production, push this via MDM
#   3) ~/.prompt-audit.conf
#   4) this file (<adapter>/config.conf)
#
# SECURITY: NEVER put a real token in this bundled file. Deliver the real URL + token via MDM to
#   path 2, or set the PROMPT_AUDIT_GATEWAY_URL / PROMPT_AUDIT_GATEWAY_TOKEN environment variables.
#   A token committed into a publicly distributed package is a leaked token.
#
# The token is a per-organization INGEST token (write-only; it cannot read the audit log).
# =============================================================================
PROMPT_AUDIT_GATEWAY_URL=https://audit.example.com/api/v1/prompts
PROMPT_AUDIT_GATEWAY_TOKEN=
