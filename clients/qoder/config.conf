# =============================================================================
# prompt-audit plugin bundled default config (lowest priority)
# =============================================================================
# Ships with the plugin. UNCONFIGURED by default (placeholder URL + empty token)
# → the plugin no-ops and passes the prompt through.
#
# Lookup priority (high → low):
#   1) <cwd>/.qoder/prompt-audit.conf
#   2) ${QODER_PLUGIN_DATA}/config.conf   ← in production, push this via MDM
#   3) ~/.qoder/prompt-audit.conf
#   4) this file (${QODER_PLUGIN_ROOT}/config.conf)
#
# SECURITY: NEVER put a real token in this bundled file. Deliver the real gateway
#   URL + token via MDM to path 2, or override with environment variables.
#   A token committed into a publicly distributed package is a leaked token.
# =============================================================================
QODER_AUDIT_GATEWAY_URL=https://audit-gateway.internal.example.com/v1/prompt
QODER_AUDIT_GATEWAY_TOKEN=
