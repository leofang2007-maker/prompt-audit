# prompt-audit Codex adapter — hook registration for ~/.codex/config.toml (user) or
# <repo>/.codex/config.toml (project). Replace <ADAPTER_DIR> with this adapter's absolute path.
#
# ⚠️ Codex hooks are an EXPERIMENTAL engine — verify the exact hook schema against the openai/codex
#    repo (docs/config.md + the draft-07 hook JSON schemas) before fleet rollout; field/format may shift.
#    Hooks fire in Codex CLI sessions, NOT in the IDE extension.
#
# Enable the hooks feature if your build gates it:
[features]
hooks = true

[[hooks.UserPromptSubmit]]
type = "command"
command = "sh \"<ADAPTER_DIR>/scripts/report-prompt.sh\""

[[hooks.SessionStart]]
type = "command"
command = "sh \"<ADAPTER_DIR>/scripts/drain-failed.sh\""
