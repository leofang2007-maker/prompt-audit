# Edge reverse proxy (compose service `nginx`). Single entry point:
#   /api/*  → server (Spring Boot)
#   /       → web  (static SPA)
# Same shape as PrismAtlas's edge nginx (minus the SSE/gateway routes it doesn't need).

upstream web_up { server web:80; }
upstream server_up { server server:8080; }

server {
  listen 80;
  client_max_body_size 4m;   # prompts can be large; cap generously

  # API → Spring Boot control plane.
  location /api/ {
    proxy_pass http://server_up;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # SPA (history fallback handled inside the web container).
  location / {
    proxy_pass http://web_up;
  }
}
