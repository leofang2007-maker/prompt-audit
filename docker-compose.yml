# Local full-stack build (dev). Builds images from source; same 2-container topology as prod
# (web serves SPA + proxies /api → server; no dedicated edge nginx).
#   docker compose up --build      →  open http://localhost:8091
#
# Prefer the faster mvn + vite loop for iteration (see README "Local development").

services:
  web:
    build: ./web
    ports:
      - "${WEB_PORT:-8091}:80"
    depends_on: [server]
    networks: [edge]

  server:
    build: ./server
    environment:
      DB_HOST: ${DB_HOST:-mysql.bedrock.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-promptaudit}
      DB_USER: ${DB_USER:-promptaudit}
      DB_PASSWORD: ${DB_PASSWORD:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@promptaudit.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-change-me-dev-secret}
      INGEST_TOKEN: ${INGEST_TOKEN:-dev-ingest-token}
    networks: [edge]

networks:
  edge:
    driver: bridge
