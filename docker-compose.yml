# Local full-stack build (dev). ONE container: builds the SPA + server image from source and runs
# a single process that serves both the SPA and the API.
#   docker compose up --build      →  open http://localhost:8091
#
# Prefer the faster mvn + vite loop for iteration (see README "Local development").

services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile   # multi-stage: builds web/ SPA then bakes it into the jar
    ports:
      - "${APP_PORT:-8091}:8080"
    environment:
      DB_HOST: ${DB_HOST:-mysql.bedrock.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-promptaudit}
      DB_USER: ${DB_USER:-promptaudit}
      DB_PASSWORD: ${DB_PASSWORD:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@promptaudit.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-change-me-dev-secret}
      INGEST_TOKEN: ${INGEST_TOKEN:-dev-ingest-token}
