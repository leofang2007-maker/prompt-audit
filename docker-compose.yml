# Local full-stack build (dev). Builds images from source and runs the same 3-container topology
# as prod. Points at the shared MySQL by default — override DB_* in a .env for a different database.
#   docker compose up --build      →  open http://localhost:8090
#
# Prefer the faster mvn + vite loop for iteration (see README "Local development").

services:
  nginx:
    image: nginx:alpine
    ports:
      - "${EDGE_PORT:-8090}:80"
    volumes:
      - ./nginx/edge.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [web, server]
    networks: [edge]

  web:
    build: ./web
    networks: [edge]

  server:
    build: ./server
    environment:
      DB_HOST: ${DB_HOST:-mysql.bedrock.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-promptaudit}
      DB_USER: ${DB_USER:-promptaudit}
      DB_PASSWORD: ${DB_PASSWORD:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@promptaudit.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-change-me-dev-secret}
      INGEST_TOKEN: ${INGEST_TOKEN:-dev-ingest-token}
    networks: [edge]

networks:
  edge:
    driver: bridge
