server:
  port: 8080

spring:
  application:
    name: prompt-audit-server
  datasource:
    # Point DB_* at your MySQL; a dedicated `promptaudit` database keeps audit data isolated.
    # All values overridable by env. (createDatabaseIfNotExist=true so the DB is created on first boot.)
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:promptaudit}?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USER:promptaudit}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update          # demo: auto-create/upgrade the single table
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        jdbc:
          time_zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  # Admin login (single admin, read side). Set strong values per deploy via env.
  admin:
    email: ${ADMIN_EMAIL:admin@promptaudit.local}
    password: ${ADMIN_PASSWORD:changeme}
  # Admin session JWT signing.
  jwt:
    secret: ${JWT_SECRET:change-me-dev-secret}
    ttlSeconds: ${JWT_TTL:43200}   # 12h
  # Ingest bearer token for client hooks (write side). Empty ⇒ ingest endpoint is CLOSED (fail shut).
  ingest:
    token: ${INGEST_TOKEN:}
  # Secret redaction at capture (spec 0002). `mask` (default) masks well-formed secrets — AWS/GitHub/
  # Google/Slack/Stripe/OpenAI keys, private-key blocks, JWTs, and explicit password=/secret= values —
  # with a typed token before the prompt is stored or hashed, so the audit log keeps the evidence, not
  # the secret. Set `off` to store verbatim. `extra` adds operator rules as "type=regex" entries.
  redaction:
    mode: ${REDACTION_MODE:mask}
    extra: ${REDACTION_EXTRA:}
  # Anti-surveillance guardrails (spec 0003). When true, revealing a full prompt (detail view) or
  # exporting requires a non-empty `reason`, recorded in the tamper-evident admin access log. Set false
  # to drop the reason requirement (access is still logged).
  access:
    require-reason: ${ACCESS_REQUIRE_REASON:true}
