# The web container's nginx is the ONLY nginx this project runs: it serves the built SPA
# AND reverse-proxies /api → server. No separate "edge" container. The shared host/ingress
# nginx (the one already fronting the other services) just forwards one port here.
server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 4m;   # prompts can be large

  # API → Spring Boot backend. Variable + resolver so nginx re-resolves the `server` container
  # at request time (survives server redeploys / IP changes; doesn't fail to start if it's down).
  location /api/ {
    resolver 127.0.0.11 valid=10s ipv6=off;   # docker embedded DNS
    set $backend server;
    proxy_pass http://$backend:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # SPA with history fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
