# Production compose — pulls a prebuilt image, builds nothing. Points at YOUR existing MySQL.
# (For a zero-dependency local run that bundles MySQL, use docker-compose.yml instead.)
# Deploy: check out this repo + a .env (see .env.example) on the host, then:
#   docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d
#
# ONE container: the server serves BOTH the SPA (baked into the jar's static resources) and the API.
# Front it with your own TLS reverse proxy (example: ops/nginx-prompt-audit.site) → 127.0.0.1:${APP_PORT}.

services:
  server:
    image: ${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/promptaudit-server:${TAG}
    ports:
      - "127.0.0.1:${APP_PORT:-8091}:8080"   # bind localhost only; shared nginx proxies to it
    environment:
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-promptaudit}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      INGEST_TOKEN: ${INGEST_TOKEN}
    restart: unless-stopped
