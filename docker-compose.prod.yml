# host1 production compose — pulls prebuilt ACR images, builds nothing.
# Deploy: host1 has this repo checked out + a .env (see .env.example), then:
#   docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d
#
# Only 2 containers — NO dedicated edge nginx. The `web` container's own nginx serves the SPA AND
# proxies /api → server, so the whole project exposes ONE host port. Public entry is the EXISTING
# shared nginx (the one already fronting prism & the other services): add ops/nginx-prompt-audit.site
# to it, forwarding to 127.0.0.1:${WEB_PORT}.
#
# Storage: REUSES the shared host1 MySQL (mysql.bedrock.internal) via a dedicated `promptaudit` DB.

services:
  web:
    image: ${ACR_REGISTRY}/${ACR_NAMESPACE}/promptaudit-web:${TAG}
    ports:
      - "127.0.0.1:${WEB_PORT:-8091}:80"   # bind localhost only; shared nginx proxies to it
    depends_on: [server]
    networks: [edge]
    restart: unless-stopped

  server:
    image: ${ACR_REGISTRY}/${ACR_NAMESPACE}/promptaudit-server:${TAG}
    # No published ports — only reachable by `web` over the internal network.
    environment:
      DB_HOST: ${DB_HOST:-mysql.bedrock.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-promptaudit}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      INGEST_TOKEN: ${INGEST_TOKEN}
    networks: [edge]
    restart: unless-stopped

networks:
  edge:
    driver: bridge
