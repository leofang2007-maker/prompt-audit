# host1/host2 production compose — pulls the prebuilt ACR image, builds nothing.
# Deploy: the host has this repo checked out + a .env (see .env.example), then:
#   docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d
#
# ONE container: the server serves BOTH the SPA (baked into the jar's static resources) and the API.
# Public entry is the EXISTING shared unified-ingress nginx (the one already fronting prism & the
# other services): add ops/nginx-prompt-audit.site to it, forwarding audit.theprismatlas.com →
# 127.0.0.1:${APP_PORT}.
#
# Storage: REUSES the shared host1 MySQL (mysql.bedrock.internal) via a dedicated `promptaudit` DB.

services:
  server:
    image: ${ACR_REGISTRY}/${ACR_NAMESPACE}/promptaudit-server:${TAG}
    ports:
      - "127.0.0.1:${APP_PORT:-8091}:8080"   # bind localhost only; shared nginx proxies to it
    environment:
      DB_HOST: ${DB_HOST:-mysql.bedrock.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-promptaudit}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      INGEST_TOKEN: ${INGEST_TOKEN}
    restart: unless-stopped
