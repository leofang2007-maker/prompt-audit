# host1 production compose — pulls prebuilt ACR images, builds nothing.
# Deploy: host1 has this repo checked out + a .env (see .env.example), then:
#   docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d
#
# Storage: REUSES the shared host1 MySQL (mysql.bedrock.internal) via a dedicated `promptaudit`
# database — resolved through the host DNS/PVTZ, so no shared docker network is required here.

services:
  nginx:
    image: nginx:alpine
    ports:
      - "${EDGE_PORT:-8090}:80"
    volumes:
      - ./nginx/edge.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [web, server]
    networks: [edge]
    restart: unless-stopped

  web:
    image: ${ACR_REGISTRY}/${ACR_NAMESPACE}/promptaudit-web:${TAG}
    networks: [edge]
    restart: unless-stopped

  server:
    image: ${ACR_REGISTRY}/${ACR_NAMESPACE}/promptaudit-server:${TAG}
    environment:
      # --- shared MySQL (dedicated DB) ---
      DB_HOST: ${DB_HOST:-mysql.bedrock.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-promptaudit}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      # --- admin login (read side) ---
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      # --- ingest token (write side; client hooks) ---
      INGEST_TOKEN: ${INGEST_TOKEN}
    networks: [edge]
    restart: unless-stopped

networks:
  edge:
    driver: bridge
